<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pénztár | Lumina Luxus Étterem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
    
    <style>
        :root {
            --bg-dark: #02050D;
            --bg-panel: rgba(10, 20, 45, 0.65);
            --accent-gold: #D4AF37;
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --font-heading: 'Playfair Display', serif;
            --font-text: 'Montserrat', sans-serif;
            --danger: #e74c3c;
        }

        body {
            font-family: var(--font-text);
            background: radial-gradient(circle at top, #0A1931 0%, #02050D 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 100px;
            margin: 0;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background: rgba(2, 5, 13, 0.85); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            box-sizing: border-box; /* Ez a sor oldja meg a kilógást! */
        }
        /* --- UNIVERZÁLIS MINIMALISTA NAVIGÁCIÓS GOMBOK --- */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem; /* Távolság a Kosár és Bejelentkezés között */
        }
        
        .nav-actions a, .nav-actions button {
            background: transparent;
            color: var(--accent-gold);
            border: none;
            font-family: var(--font-text);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
        
        .nav-actions a:hover, .nav-actions button:hover {
            color: #fff;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            background: transparent; /* Eltünteti a régi sárga hátteret */
            box-shadow: none;
        }
        .logo { font-family: var(--font-heading); font-size: 2rem; color: var(--accent-gold); text-decoration: none; letter-spacing: 2px; }

        .container {
            max-width: 1000px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem;
        }

        .checkout-card {
            background: var(--bg-panel); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 2rem; border-radius: 8px; backdrop-filter: blur(10px); height: fit-content;
        }

        h2 { font-family: var(--font-heading); color: var(--accent-gold); margin-bottom: 1.5rem; }

        /* Kosár tételek */
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .cart-item:last-child { border-bottom: none; }
        .item-info h4 { margin: 0; color: #fff; }
        .item-info p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }
        
        .quantity-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn {
            background: transparent; border: 1px solid var(--accent-gold);
            color: var(--accent-gold); width: 28px; height: 28px; cursor: pointer; border-radius: 3px; font-weight: bold;
        }
        .qty-btn:hover { background: var(--accent-gold); color: var(--bg-dark); }
        
        .btn-remove { border-color: var(--danger); color: var(--danger); width: auto; padding: 0 10px; }
        .btn-remove:hover { background: var(--danger); color: #fff; }

        /* Űrlap */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%; padding: 0.9rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; border-radius: 4px; font-family: var(--font-text); transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent-gold); }

        .total-box {
            margin-top: 2rem; padding-top: 1rem; border-top: 2px solid var(--accent-gold);
            display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 600; color: #fff;
        }

        .btn-order {
            width: 100%; padding: 1.2rem; background: var(--accent-gold); color: var(--bg-dark);
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 1.5rem;
            text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-text); transition: 0.3s;
        }
        .btn-order:hover:not(:disabled) { background: #F1C40F; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        .btn-order:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- UNIVERZÁLIS NAVIGÁCIÓ STÍLUSOK --- */
        .nav-links {
            display: flex;
            gap: 2rem;
            margin: 0 auto; /* Középre igazítja a linkeket */
        }

        .nav-links a, .nav-actions a, .nav-actions button {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: var(--font-text);
        }

        .nav-links a:hover, .nav-actions a:hover, .nav-actions button:hover {
            color: var(--accent-gold);
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #navCartBtn {
            color: var(--accent-gold); /* A kosár maradjon mindig kiemelt arany */
        }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
        /* --- MOBIL RESZPONSZÍV MENÜ (Hamburger) --- */
        .hamburger {
            display: none; /* Mobilon kívül rejtve van */
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: var(--accent-gold);
            border-radius: 2px;
            transition: 0.3s;
        }

        @media (max-width: 850px) {
            .hamburger {
                display: flex;
                order: 3; /* A legszélére tolja a gombot */
            }

            .nav-actions {
                order: 2; /* A logó és a hamburger közé kerül */
                margin-left: auto;
                margin-right: 20px;
            }

            /* A linkek összecsukása egy lenyíló menübe */
            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(2, 5, 13, 0.95);
                backdrop-filter: blur(10px);
                flex-direction: column;
                text-align: center;
                max-height: 0; /* Alapból zárva */
                overflow: hidden;
                transition: max-height 0.4s ease, padding 0.4s ease;
                margin: 0;
                gap: 0;
                border-bottom: 1px solid transparent;
            }

            /* Ez az osztály nyitja ki a menüt */
            .nav-links.active {
                max-height: 350px;
                padding: 1.5rem 0;
                border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            }

            .nav-links a {
                padding: 15px 0;
                display: block;
                width: 100%;
            }
        }

        /* Extra kis telefonokra optimalizálás */
        @media (max-width: 480px) {
            .logo { font-size: 1.5rem; }
            .nav-actions { gap: 1rem; margin-right: 15px; }
            .nav-actions a, .nav-actions button { font-size: 0.75rem; }
            nav { padding: 1rem 5%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LUMINA</a>
        
        <!-- Fontos: megkapta az id="navLinks" azonosítót -->
        <div class="nav-links" id="navLinks">
            <a href="index.html">Főoldal</a>
            <a href="about.html">Rólunk</a>
            <a href="shop.html">Étlap</a>
            <a href="reservation.html">Foglalás</a>
            <a href="contact.html">Kapcsolat</a>
        </div>

        <div class="nav-actions">
            <a href="shop.html" id="navCartBtn">Kosár (0)</a>
            <a href="login.html" id="navLoginBtn">Bejelentkezés</a>
        </div>

        <!-- Új hamburger gomb -->
        <div class="hamburger" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="container">
        <div class="checkout-card">
            <h2>Rendelés Áttekintése</h2>
            <div id="cartList">
                <p>Kosár betöltése...</p>
            </div>
            <div class="total-box">
                <span>Fizetendő Végösszeg:</span>
                <span id="totalDisplay">0 Ft</span>
            </div>
        </div>

        <div class="checkout-card">
            <h2>Szállítás & Fizetés</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>Teljes név</label>
                    <input type="text" id="custName" required>
                </div>
                <div class="form-group">
                    <label>Telefonszám</label>
                    <input type="tel" id="custPhone" placeholder="+36..." required>
                </div>
                <div class="form-group">
                    <label>Szállítási cím (Ha van étel rendelés)</label>
                    <input type="text" id="custAddress" placeholder="Város, utca, házszám">
                </div>
                <div class="form-group">
                    <label>Fizetési mód</label>
                    <select id="paymentMethod">
                        <option value="card_online">Bankkártya (Online)</option>
                        <option value="cash">Készpénz az átvételkor/helyszínen</option>
                    </select>
                </div>
                <button type="submit" class="btn-order" id="submitOrderBtn">Rendelés Megerősítése</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, serverTimestamp, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCytHaIELWaEZ-DwWuPDMdrTKj9Lwioay0",
            authDomain: "balaton-tengeri-etterem.firebaseapp.com",
            projectId: "balaton-tengeri-etterem",
            storageBucket: "balaton-tengeri-etterem.firebasestorage.app",
            messagingSenderId: "1070631358793",
            appId: "1:1070631358793:web:1a6603f54b9f1948e5ca98",
            measurementId: "G-F214XZK2QV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // FOGLALÁSI DÍJ (Ft / fő) - Ezt bármikor módosíthatod!
        const DEPOSIT_PER_GUEST = 5000;

        let cart = JSON.parse(localStorage.getItem('lumina_cart')) || [];
        let currentUser = null;

        const cartList = document.getElementById('cartList');
        const totalDisplay = document.getElementById('totalDisplay');
        const orderForm = document.getElementById('orderForm');

        // Bejelentkezés ellenőrzése
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Ezt a két sort add hozzá:
                document.getElementById('navLoginBtn').textContent = "Fiókom";
                document.getElementById('navLoginBtn').href = "profile.html";
            } else {
                alert("A folytatáshoz be kell jelentkezned!");
                window.location.href = "login.html";
            }
        });

        // Kosár Megjelenítése
        function renderCart() {
            if (cart.length === 0) {
                cartList.innerHTML = "<p style='color: var(--text-muted);'>A kosarad jelenleg üres.</p>";
                totalDisplay.textContent = "0 Ft";
                document.getElementById('submitOrderBtn').disabled = true;
                return;
            }

            document.getElementById('submitOrderBtn').disabled = false;
            cartList.innerHTML = "";
            let totalAmount = 0;

            cart.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'cart-item';

                // Külön kezeljük a foglalást és az ételrendelést
                if (item.isReservation) {
                    const guests = parseInt(item.resGuests);
                    const resPrice = guests * DEPOSIT_PER_GUEST;
                    totalAmount += resPrice;

                    div.innerHTML = `
                        <div class="item-info">
                            <h4 style="color: var(--accent-gold);">Márvány Asztalfoglalás</h4>
                            <p>${item.resDate} | ${item.resTime} | ${guests} főre</p>
                            <p style="color: #fff; font-weight: bold; margin-top: 5px;">Foglalási díj: ${resPrice.toLocaleString('hu-HU')} Ft</p>
                        </div>
                        <div class="quantity-controls">
                            <button type="button" class="qty-btn btn-remove" onclick="removeItem(${index})">Törlés</button>
                        </div>
                    `;
                } else {
                    const subtotal = item.price * item.quantity;
                    totalAmount += subtotal;

                    div.innerHTML = `
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price.toLocaleString('hu-HU')} Ft / db</p>
                        </div>
                        <div class="quantity-controls">
                            <button type="button" class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                            <span style="color: #fff; font-weight: bold;">${item.quantity}</span>
                            <button type="button" class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                    `;
                }
                
                cartList.appendChild(div);
            });

            totalDisplay.textContent = totalAmount.toLocaleString('hu-HU') + " Ft";
            // Ez frissíti a fenti menüben a gombot
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.getElementById('navCartBtn').textContent = `Kosár (${totalItems})`;
        }

        // Tétel törlése (Főleg foglalásokhoz)
        window.removeItem = (index) => {
            cart.splice(index, 1);
            localStorage.setItem('lumina_cart', JSON.stringify(cart));
            renderCart();
        };

        // Mennyiség módosítása (Ételekhez)
        window.updateQty = (index, change) => {
            const item = cart[index];
            const newQty = item.quantity + change;
            
            if (change > 0 && item.maxStock && newQty > item.maxStock) {
                alert(`Ebből az ételből maximum ${item.maxStock} db rendelhető egyszerre!`);
                return;
            }

            item.quantity = newQty;
            if (item.quantity <= 0) cart.splice(index, 1);
            
            localStorage.setItem('lumina_cart', JSON.stringify(cart));
            renderCart();
        };

        renderCart();

        // Rendelés és Foglalás Leadása (Tranzakcióval)
        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) { alert("Kérlek jelentkezz be újra!"); return; }
            if (cart.length === 0) { alert("Üres kosárral nem lehet továbbhaladni."); return; }

            const submitBtn = document.getElementById('submitOrderBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Feldolgozás alatt...";

            try {
                // Szétválasztjuk a kosár tartalmát ételekre és foglalásokra
                const foodItems = cart.filter(item => !item.isReservation);
                const resItems = cart.filter(item => item.isReservation);

                // FIREBASE TRANZAKCIÓ: Atomi műveletként fut le
                await runTransaction(db, async (transaction) => {
                    
                    const productRefs = [];

                    // 1. Ha vannak ételek, készlet ellenőrzése
                    if (foodItems.length > 0) {
                        for (const item of foodItems) {
                            const pRef = doc(db, "products", item.id);
                            const pDoc = await transaction.get(pRef);
                            
                            if (!pDoc.exists()) throw `A(z) ${item.name} már nem elérhető az étlapon.`;
                            
                            const currentStock = pDoc.data().stock || 0;
                            if (currentStock < item.quantity) throw `Sajnos a(z) ${item.name} ételből nincs elég raktáron. (Elérhető: ${currentStock} db)`;
                            
                            productRefs.push({ ref: pRef, newStock: currentStock - item.quantity });
                        }
                    }

                    // 2. Készlet csökkentése
                    productRefs.forEach(p => { transaction.update(p.ref, { stock: p.newStock }); });

                    // 3. Étel rendelés mentése az 'orders' táblába
                    if (foodItems.length > 0) {
                        const orderData = {
                            userId: currentUser.uid,
                            customerName: document.getElementById('custName').value,
                            phone: document.getElementById('custPhone').value,
                            address: document.getElementById('custAddress').value,
                            paymentMethod: document.getElementById('paymentMethod').value,
                            items: foodItems,
                            totalAmount: foodItems.reduce((sum, i) => sum + (i.price * i.quantity), 0),
                            status: "pending",
                            createdAt: serverTimestamp()
                        };
                        const orderRef = doc(collection(db, "orders"));
                        transaction.set(orderRef, orderData);
                    }

                    // 4. Foglalás mentése a 'reservations' táblába
                    if (resItems.length > 0) {
                        for (const item of resItems) {
                            const resData = {
                                userId: currentUser.uid,
                                customerName: document.getElementById('custName').value,
                                phone: document.getElementById('custPhone').value,
                                resDate: item.resDate,
                                resTime: item.resTime,
                                resGuests: item.resGuests,
                                resRequests: item.resRequests,
                                depositPaid: parseInt(item.resGuests) * DEPOSIT_PER_GUEST,
                                status: "pending",
                                createdAt: serverTimestamp()
                            };
                            const resRef = doc(collection(db, "reservations"));
                            transaction.set(resRef, resData);
                        }
                    }
                });

                // Siker esetén
                localStorage.removeItem('lumina_cart');
                alert("Sikeres fizetés! A tételeket rögzítettük a rendszerünkben.");
                window.location.href = "profile.html";

            } catch (error) {
                console.error("Tranzakció hiba:", error);
                alert("Hiba: " + error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Rendelés Megerősítése";
                renderCart();
            }
        });
    </script>
    <script>
        // Mobil menü nyitása / csukása
        function toggleMobileMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
    </script>
</body>
</html>
